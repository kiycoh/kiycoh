name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Get Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt
      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
          BIRTHDAY: ${{ secrets.BIRTHDAY }}
        run: python today.py
      - name: Cache-bust README
        run: |
          TIMESTAMP=$(date +%s)
          cat > README.md << EOF
          <a href="https://github.com/kiycoh/kiycoh">
            <picture>
              <source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/kiycoh/kiycoh/main/dark_mode.svg?v=${TIMESTAMP}">
              <img alt="kiycoh's GitHub Profile README" src="https://raw.githubusercontent.com/kiycoh/kiycoh/main/light_mode.svg?v=${TIMESTAMP}">
            </picture>
          </a>
          EOF
          sed -i 's/^          //' README.md
      - name: Commit
        run: |-
          git add .
          git diff
          git config --global user.email "github-actions-bot@kiycoh.github.io"
          git config --global user.name "kiycoh/kiycoh"
          git commit -m "Updated README" -a || echo "No changes to commit"
          git push
